<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Masque pour garder les continents à l'intérieur du globe -->
    <clipPath id="globeClip">
      <circle cx="56" cy="56" r="48" />
    </clipPath>
    
    <!-- Ombre portée pour bien détacher le trombone -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- LA PLANÈTE -->
  <!-- Océan -->
  <circle cx="56" cy="56" r="48" fill="#4285f4" />

  <!-- Continents (Vert) -->
  <g clip-path="url(#globeClip)">
    <path d="M 20 10 C 50 -10, 70 30, 50 60 C 30 90, -10 50, 10 20 Z" fill="#34a853"/>
    <path d="M 65 42 C 100 20, 130 60, 95 90 C 70 110, 40 70, 65 42 Z" fill="#34a853"/>
    <path d="M 15 75 C 30 85, 45 65, 30 50 C 15 40, -5 65, 15 75 Z" fill="#34a853"/>
  </g>

  <!-- Ombre interne légère pour l'effet de sphère -->
  <circle cx="56" cy="56" r="48" fill="none" stroke="#222" stroke-width="4" stroke-opacity="0.1" />

  <!-- LE TROMBONE (En bas à droite) -->
  <g transform="translate(52, 52) rotate(22)" filter="url(#shadow)">
    <!-- Contour blanc pour bien détacher le trombone du globe -->
    <path d="M25,48 L25,18 A7,7 0 0,1 39,18 L39,52 A13,13 0 0,1 13,52 L13,12 A19,19 0 0,1 51,12 L51,45" 
          fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Trombone lui-même (Jaune Google pour le contraste) -->
    <path d="M25,48 L25,18 A7,7 0 0,1 39,18 L39,52 A13,13 0 0,1 13,52 L13,12 A19,19 0 0,1 51,12 L51,45" 
          fill="none" stroke="#fbbc04" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
