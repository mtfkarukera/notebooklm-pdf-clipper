<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NotebookLM Web Clipper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- HEADER -->
  <header class="app-header">
    <div class="logo">
      <div class="logo-icon"></div>
    </div>
    <div class="header-right" style="display: flex; align-items: center; gap: 8px;">
      <select id="locale-selector" class="locale-selector" title="Langue" data-i18n-title="popupLabelLocale">
        <option value="auto">Auto</option>
        <option value="gcf">Kréyòl</option>
      </select>
      <select id="account-switcher" class="hidden" title="Changer de compte Google" data-i18n-title="popupTitleAccountSwitcher"></select>
      <div id="auth-status" class="status-badge status-loading" data-i18n="statusConnecting">Connexion...</div>
    </div>
  </header>

  <!-- RECHERCHE & SELECTION CARNET -->
  <section class="research-section">
    <label for="notebook-search" data-i18n="popupLabelSelectNotebook">Vos Carnets</label>
    <div class="input-group">
      <input type="text" id="notebook-search" placeholder="Rechercher un carnet (Fast Research)..." disabled data-i18n-placeholder="popupPlaceholderSearchNotebook" />
      <button id="btn-create-notebook" title="Créer un nouveau carnet" data-i18n-title="btnCreateNotebookTitle">+</button>
    </div>
    
    <!-- Liste des carnets filtrés -->
    <div id="notebook-list" class="notebook-list">
        <div class="placeholder-text" data-i18n="loadingNotebooks">Veuillez patienter...</div>
    </div>
  </section>

  <!-- FORMAT TOGGLE -->
  <section class="format-section">
    <label data-i18n="popupLabelFormat">Format d'import</label>
    <div class="format-toggle" id="format-toggle">
      <button class="format-btn active" data-format="pdf" title="Images intégrées, mise en page visuelle" data-i18n="btnPdf" data-i18n-aria-label="btnPdfAriaLabel" data-i18n-title="btnPdfTitle">📄 PDF</button>
      <button class="format-btn" data-format="md" title="Tables parfaites, ultra-léger, natif Gemini" data-i18n="btnMarkdown" data-i18n-aria-label="btnMarkdownAriaLabel" data-i18n-title="btnMarkdownTitle">📝 Markdown</button>
      <button class="format-btn" data-format="url" title="Import instantané — NotebookLM scrape la page" data-i18n="btnUrl" data-i18n-aria-label="btnUrlAriaLabel" data-i18n-title="btnUrlTitle">🔗 URL</button>
      <button class="format-btn" data-format="screenshot" title="Capture le viewport visible en PNG" data-i18n="btnScreenshot" data-i18n-aria-label="btnScreenshotAriaLabel" data-i18n-title="btnScreenshotTitle">📸</button>
      <button class="format-btn" data-format="drive" id="btn-drive-import" style="display: none;" title="Synchronisation native Google Drive" data-i18n="btnDrive" data-i18n-aria-label="btnDriveAriaLabel" data-i18n-title="btnDriveTitle">☁️ Drive</button>
    </div>
    <!-- Bouton Import Direct : masqué par défaut, affiché dynamiquement -->
    <div id="direct-import-section" class="direct-import-section hidden">
      <button class="format-btn format-btn-direct" data-format="direct" id="btn-direct-import" title="Importer le fichier original tel quel" data-i18n-aria-label="btnDirectAriaLabel" data-i18n-title="btnDirectTitle">
        ⚡ <span id="direct-label" data-i18n="btnDirect">Import direct</span>
      </button>
    </div>
  </section>

  <!-- BANDEAU SÉLECTION (affiché quand une sélection est en attente) -->
  <section id="selection-banner" class="selection-banner hidden">
    <div class="selection-info">
      <span class="selection-icon">📋</span>
      <span id="selection-text-preview" data-i18n="notifSelectionCaptured">Sélection capturée</span>
    </div>
    <button id="btn-clear-selection" class="selection-clear" title="Annuler" data-i18n-title="btnClearSelectionTitle">✕</button>
  </section>

  <!-- ACTION PRINCIPALE -->
  <section class="action-section">
    <div id="intent-wrapper" class="intent-wrapper">
      <textarea
        id="intent-input"
        class="intent-input"
        rows="2"
        maxlength="300"
        placeholder="Note pour l'IA (optionnel) — ex : Comparer avec le rapport 2024"
        aria-label="Note d'intention pour NotebookLM"
        data-i18n-placeholder="intentNotePlaceholder"
        data-i18n-aria-label="intentNoteLabelVisible"
      ></textarea>
      <span id="intent-counter" class="intent-counter">0 / 300</span>
    </div>
    <button id="btn-capture" class="btn primary-btn" disabled>
      <span class="btn-text" data-i18n="popupTitleCapture">Capturer la page</span>
      <span id="btn-spinner" class="spinner hidden"></span>
    </button>
  </section>

  <!-- ZONE DE STATUT / INDICATEURS -->
  <footer class="app-footer">
    <div id="status-message" class="status-message" data-i18n="popupStatusReady">Prêt</div>
  </footer>

  <!-- BOUTON FERMER (Autonome, pour mobile et desktop) -->
  <button id="btn-close" class="btn close-btn" data-i18n="btnClose">✖ Fermer</button>

  <script type="module" src="popup.js"></script>
</body>
</html>
