<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NotebookLM Web Clipper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- HEADER -->
  <header class="app-header">
    <div class="logo">
      <div class="logo-icon"></div>
      <span class="logo-text">NotebookLM</span>
    </div>
    <div class="header-right" style="display: flex; align-items: center; gap: 8px;">
      <select id="account-switcher" class="hidden" title="Changer de compte Google"></select>
      <div id="auth-status" class="status-badge status-loading">Connexion...</div>
    </div>
  </header>

  <!-- RECHERCHE & SELECTION CARNET -->
  <section class="research-section">
    <label for="notebook-search">Vos Carnets</label>
    <div class="input-group">
      <input type="text" id="notebook-search" placeholder="Rechercher un carnet (Fast Research)..." disabled />
      <button id="btn-create-notebook" title="Créer un nouveau carnet">+</button>
    </div>
    
    <!-- Liste des carnets filtrés -->
    <div id="notebook-list" class="notebook-list">
        <div class="placeholder-text">Veuillez patienter...</div>
    </div>
  </section>

  <!-- FORMAT TOGGLE -->
  <section class="format-section">
    <label>Format d'import</label>
    <div class="format-toggle" id="format-toggle">
      <button class="format-btn active" data-format="pdf" title="Images intégrées, mise en page visuelle">📄 PDF</button>
      <button class="format-btn" data-format="md" title="Tables parfaites, ultra-léger, natif Gemini">📝 Markdown</button>
      <button class="format-btn" data-format="url" title="Import instantané — NotebookLM scrape la page">🔗 URL</button>
      <button class="format-btn" data-format="screenshot" title="Capture le viewport visible en PNG">📸</button>
    </div>
    <!-- Bouton Import Direct : masqué par défaut, affiché dynamiquement -->
    <div id="direct-import-section" class="direct-import-section hidden">
      <button class="format-btn format-btn-direct" data-format="direct" id="btn-direct-import" title="Importer le fichier original tel quel">
        ⚡ <span id="direct-label">Import direct</span>
      </button>
      <!-- File picker pour fichiers locaux (file://) -->
      <div id="file-picker-section" class="file-picker-section hidden">
        <label class="file-picker-label" for="file-picker-input" id="file-picker-label">📂 Sélectionner le fichier</label>
        <input type="file" id="file-picker-input" class="hidden"
          accept=".pdf,.txt,.md,.docx,.csv,.pptx,.epub,.avif,.bmp,.gif,.ico,.jp2,.png,.webp,.tif,.tiff,.heic,.heif,.jpeg,.jpg,.jpe,.3g2,.3gp,.aac,.aif,.aifc,.aiff,.amr,.au,.avi,.cda,.m4a,.mid,.mp3,.mp4,.mpeg,.ogg,.opus,.ra,.ram,.snd,.wav,.wma" />
        <span id="file-picker-name" class="file-picker-name"></span>
      </div>
    </div>
  </section>

  <!-- ACTION PRINCIPALE -->
  <section class="action-section">
    <button id="btn-capture" class="btn primary-btn" disabled>
      <span class="btn-text">Capturer la page</span>
      <span id="btn-spinner" class="spinner hidden"></span>
    </button>
  </section>

  <!-- ZONE DE STATUT / INDICATEURS -->
  <footer class="app-footer">
    <div id="status-message" class="status-message">Prêt</div>
  </footer>

  <!-- BOUTON FERMER (Autonome, pour mobile et desktop) -->
  <button id="btn-close" class="btn close-btn">✖ Fermer</button>

  <script src="popup.js"></script>
</body>
</html>
